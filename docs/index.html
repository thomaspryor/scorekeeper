<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>Scorekeeper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Top Toolbar -->
    <header class="toolbar toolbar-top">
      <button id="btn-add-player" class="toolbar-btn" aria-label="Add player">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
      </button>
      <button id="btn-undo" class="toolbar-btn" aria-label="Undo" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/>
        </svg>
      </button>
      <button id="btn-sort" class="toolbar-btn" aria-label="Sort by score">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/>
        </svg>
        <span class="sort-label">Sort</span>
      </button>
    </header>

    <!-- Main Content -->
    <main class="player-list" id="player-list">
      <!-- Players rendered here by JS -->
    </main>

    <!-- Bottom Toolbar -->
    <footer class="toolbar toolbar-bottom">
      <button id="btn-reset" class="toolbar-btn" aria-label="Reset all scores">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
        <span>Reset</span>
      </button>
      <button id="btn-sound" class="toolbar-btn" aria-label="Toggle sound">
        <svg viewBox="0 0 24 24" fill="currentColor" class="sound-on">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg viewBox="0 0 24 24" fill="currentColor" class="sound-off">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
        <span class="sound-label">Sound</span>
      </button>
    </footer>

    <!-- Edit Modal -->
    <div id="edit-modal" class="edit-modal" hidden>
      <div class="edit-modal-content">
        <div class="color-picker" id="color-picker">
          <!-- Colors rendered by JS -->
        </div>
        <div class="edit-row">
          <button id="btn-delete-player" class="edit-btn delete-btn" aria-label="Delete player">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
            </svg>
          </button>
          <input type="text" id="edit-name" class="edit-name-input" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
          <button id="btn-confirm-edit" class="edit-btn confirm-btn" aria-label="Confirm">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
