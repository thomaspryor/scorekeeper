name: Scorekeep
options:
  bundleIdPrefix: co.scorekeep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    INFOPLIST_KEY_CFBundleDisplayName: Scorekeep
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Scorekeep:
    type: application
    platform: iOS
    sources:
      - path: Scorekeep
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.scorekeep.app
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
